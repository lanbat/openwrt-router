# Drop this file into /etc/nginx/conf.d/ (or include it from your server block).
#
# On OpenWrt snapshot, nginx is available via: apk add nginx
#
# You also need to move uhttpd off port 80:
#   uci set uhttpd.main.listen_http='127.0.0.1:8181'
#   uci set uhttpd.main.listen_https='127.0.0.1:8443'
#   uci commit uhttpd && /etc/init.d/uhttpd restart
# then start nginx on 80 with this config to proxy both services.

server {
    listen 80;
    listen [::]:80;

    # kestreld Rust daemon handles these two paths
    location /cgi-bin/status {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    location /cgi-bin/device {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host $host;
        proxy_read_timeout 10s;
    }

    # All other CGI scripts and static files remain on uhttpd
    location / {
        proxy_pass       http://127.0.0.1:8181;
        proxy_set_header Host $host;
    }
}
